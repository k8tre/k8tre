# https://github.com/kubernetes/ingress-nginx/blob/helm-chart-4.13.3/charts/ingress-nginx/values.yaml

controller:
  service:
    annotations:
      # https://kubernetes-sigs.github.io/aws-load-balancer-controller/v2.14/guide/service/annotations/
      service.beta.kubernetes.io/aws-load-balancer-type: external
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      # Restrict which IPs can access load-balancer using a prefix list
      service.beta.kubernetes.io/aws-load-balancer-security-group-prefix-lists: pl-03d7c0852694050ca
      # Certificate
      service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:eu-west-2:356693768110:certificate/3ef6c0f8-a4f5-4590-b876-d6fc741a7929"
      service.beta.kubernetes.io/aws-load-balancer-backend-protocol: ssl
