apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Common resources that all environments will inherit
# resources:
#   - namespace.yaml

# Create a ConfigMap with common values that can be read by environment overlays
configMapGenerator:
- name: jupyterhub-common-values
  files:
  - values.yaml=common-values.yaml

# No helmCharts section here - each environment will define its own
