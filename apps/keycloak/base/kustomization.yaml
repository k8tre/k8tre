apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keycloak

# See https://www.keycloak.org/operator/installation#_installing_multiple_operators
resources:
  - certificate.yaml
  - keycloak-db-external-secret.yaml
  - keycloak-admin-external-secret.yaml
  - keycloak-realm-config.yaml
  - gateway-route.yaml
  - postgres.yaml

  # Custom resources
  # - identity-management/users.yaml
  # - identity-management/groups.yaml
  # - identity-management/projects.yaml
  # - identity-management/keycloak.yaml

# projects-patch.yaml targets Project.research.k8tre.io resources that are
# included via identity-management/projects.yaml — currently commented out
# because the CRDs are not yet available (see commit ecb12b7). Keeping the
# patch entry while the targets are absent makes `kustomize build` fail and
# ArgoCD renders the keycloak app as zero-resource (Healthy but empty
# namespace, no keycloak pods, login redirects 404). Re-enable both lines
# together when the Project CRD lands.
# patches:
#   - path: projects-patch.yaml

helmCharts:
  - name: keycloakx
    repo: https://codecentric.github.io/helm-charts
    version: 7.1.3
    releaseName: keycloak
    namespace: keycloak
    valuesFile: values.yaml
